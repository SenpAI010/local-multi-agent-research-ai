name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest requests pillow pypdf psutil numpy matplotlib mpmath
      - name: Compile package
        run: |
          python -m compileall -q agent_system
      - name: Run research tests
        run: |
          python -X utf8 -m pytest -q test_research_mode.py test_research_web_proxy.py test_research_formal_verification.py test_research_infrastructure.py test_ollama_native.py test_system_tools_security.py test_memory_fallback.py
