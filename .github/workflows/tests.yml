name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests pillow pypdf psutil numpy matplotlib mpmath
      - name: Compile changed core modules
        run: |
          python -m py_compile agent_system\research\manager.py agent_system\research\formal_verifier.py agent_system\research\web_proxy.py agent_system\tools\web.py agent_system\core\ollama_native.py
      - name: Run research tests
        run: |
          python -X utf8 test_research_mode.py
          python -X utf8 test_research_web_proxy.py
          python -X utf8 test_research_formal_verification.py
          python -X utf8 test_research_infrastructure.py
          python -X utf8 test_ollama_native.py

